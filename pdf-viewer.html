<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>PDF Viewer</title>

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
          rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <link rel="stylesheet"
          href="css/style.css">

</head>

<body>

<header class="header">

    <div class="container">

        <nav class="navbar">

            <a href="index.html" class="logo">

                <i class="fa-solid fa-graduation-cap"></i>

                <span>Student Notes Portal</span>

            </a>

        </nav>

    </div>

</header>

<section class="viewer-page">

    <div class="container">

        <div class="viewer-header">

            <a
                id="backButton"
                class="btn btn-view">

                <i class="fa-solid fa-arrow-left"></i>

                &nbsp; Back

            </a>

            <h2 id="pdfTitle">

                Loading PDF...

            </h2>

            <a
                id="downloadBtn"
                class="btn btn-download"
                download>

                <i class="fa-solid fa-download"></i>

                &nbsp; Download

            </a>

        </div>

        <iframe

            id="pdfFrame"

            title="PDF Viewer">

        </iframe>

    </div>

</section>

<footer>

    <div class="container">

        <div class="footer-content">

            <div class="footer-logo">

                <i class="fa-solid fa-graduation-cap"></i>

                Student Notes Portal

            </div>

            <p>

                View your syllabus and notes online anytime.

            </p>

            <div class="footer-bottom">

                © 2026 Student Notes Portal

            </div>

        </div>

    </div>

</footer>

<script src="js/pdf-viewer.js"></script>

</body>

</html>
