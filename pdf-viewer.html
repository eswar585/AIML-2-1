<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Document Viewer | Student Notes Portal</title>

    <link rel="preconnect"
        href="https://fonts.googleapis.com">

    <link rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <link
        rel="stylesheet"
        href="css/style.css">

    <style>

        /* ================================
           DOCUMENT VIEWER PAGE
        ================================= */

        .viewer-page {

            min-height: calc(100vh - 80px);

            padding: 25px 0 40px;

            background: #f5f7fb;

        }


        /* ================================
           VIEWER HEADER
        ================================= */

        .viewer-header {

            display: flex;

            align-items: center;

            justify-content: space-between;

            gap: 20px;

            margin-bottom: 20px;

        }


        .viewer-header h2 {

            flex: 1;

            margin: 0;

            color: #172033;

            font-size: 20px;

            font-weight: 700;

            text-align: center;

            white-space: nowrap;

            overflow: hidden;

            text-overflow: ellipsis;

        }


        .viewer-header .btn {

            flex-shrink: 0;

            display: inline-flex;

            align-items: center;

            justify-content: center;

            gap: 8px;

            min-height: 44px;

            padding: 0 18px;

            border-radius: 10px;

            text-decoration: none;

            cursor: pointer;

        }


        /* ================================
           PDF VIEWER
        ================================= */

        #pdfFrame {

            display: block;

            width: 100%;

            height: calc(100vh - 210px);

            min-height: 650px;

            border: none;

            border-radius: 14px;

            background: #ffffff;

            box-shadow: 0 10px 35px rgba(0, 0, 0, 0.12);

        }


        /* ================================
           MOBILE
        ================================= */

        @media (max-width: 768px) {


            .viewer-page {

                padding: 15px 0 25px;

            }


            .viewer-header {

                flex-wrap: wrap;

                gap: 12px;

            }


            .viewer-header h2 {

                order: -1;

                flex-basis: 100%;

                font-size: 17px;

                text-align: left;

            }


            .viewer-header .btn {

                flex: 1;

                min-height: 42px;

                padding: 0 10px;

                font-size: 12px;

            }


            #pdfFrame {

                height: calc(100vh - 190px);

                min-height: 500px;

                border-radius: 10px;

            }

        }

    </style>

</head>


<body>


    <!-- ================================
         HEADER
    ================================= -->

    <header class="header">

        <div class="container">

            <nav class="navbar">


                <a
                    href="index.html"
                    class="logo">

                    <i class="fa-solid fa-graduation-cap"></i>

                    <span>

                        Student Notes Portal

                    </span>

                </a>


            </nav>

        </div>

    </header>


    <!-- ================================
         VIEWER
    ================================= -->

    <section class="viewer-page">

        <div class="container">


            <div class="viewer-header">


                <a
                    id="backButton"
                    class="btn btn-view">

                    <i class="fa-solid fa-arrow-left"></i>

                    Back

                </a>


                <h2 id="pdfTitle">

                    Loading Document...

                </h2>


                <a
                    id="downloadBtn"
                    class="btn btn-download"
                    download>

                    <i class="fa-solid fa-download"></i>

                    Download

                </a>


            </div>


            <iframe

                id="pdfFrame"

                title="Document Viewer">

            </iframe>


        </div>

    </section>


    <!-- ================================
         FOOTER
    ================================= -->

    <footer>

        <div class="container">

            <div class="footer-content">


                <div class="footer-logo">

                    <i class="fa-solid fa-graduation-cap"></i>

                    Student Notes Portal

                </div>


                <p>

                    View your syllabus and notes online anytime.

                </p>


                <div class="footer-bottom">

                    © 2026 Student Notes Portal

                </div>


            </div>

        </div>

    </footer>


    <!-- ================================
         JAVASCRIPT
    ================================= -->

    <script src="js/pdf-viewer.js"></script>


</body>

</html>
